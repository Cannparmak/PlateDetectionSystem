<!DOCTYPE html>
<html lang="{{ lang }}" class="dark">
<head>
  <meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Giriş | CanPark</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <script>
    (function(){var t=localStorage.getItem("theme")||"dark";var h=document.documentElement;h.classList.remove("dark","light");h.classList.add(t);})();
  </script>
  <script>
    tailwind.config = { darkMode:"class", theme:{ extend:{ colors:{
      "primary":          "var(--accent)",
      "surface-container":"var(--bg-card)",
      "surface-container-low":"var(--bg-sidebar)",
      "on-surface":       "var(--text-primary)",
      "on-surface-variant":"var(--text-muted)",
      "tertiary":"#4edea3","tertiary-container":"#00a572","error":"#ffb4ab",
    }}}}
  </script>
  <style>
    .material-symbols-outlined{font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24;transition:none!important;}
    *,*::before,*::after{transition:background-color 0.2s ease,color 0.15s ease;}

    html,html.dark{
      --bg-base:#111319;--bg-card:#1e1f26;--bg-sidebar:#191b22;--bg-chip:#33343b;
      --text-primary:#e2e2eb;--text-muted:#c2c6d6;--text-subtle:#8c909f;
      --accent:#adc6ff;--accent-on:#002e6a;
      --divider:rgba(66,71,84,0.15);--glow:0 0 20px rgba(77,142,255,0.30);
    }
    html.light{
      --bg-base:#e8ecf1;--bg-card:#f6f8fb;--bg-sidebar:#f0f3f7;--bg-chip:#cdd5e0;
      --text-primary:#1c2128;--text-muted:#424a57;--text-subtle:#656d76;
      --accent:#1a7f37;--accent-on:#ffffff;
      --divider:rgba(28,33,40,0.10);--glow:0 0 18px rgba(26,127,55,0.25);
    }

    body{background-color:var(--bg-base);color:var(--text-primary);font-family:'Inter',sans-serif;}
    .ghost-border{border:1px solid var(--divider);}
    .glow-active{box-shadow:var(--glow);}
    input:focus{outline:none;border-color:rgba(77,142,255,0.5)!important;box-shadow:0 0 0 4px rgba(77,142,255,0.1);}

    html.light .bg-\[\#191b22\]{background-color:var(--bg-sidebar)!important;}
    html.light .bg-\[\#1e1f26\]{background-color:var(--bg-card)!important;}
    html.light .bg-\[\#33343b\]{background-color:var(--bg-chip)!important;}
    html.light .text-\[\#e2e2eb\],html.light .text-white{color:var(--text-primary)!important;}
    html.light .text-\[\#c2c6d6\]{color:var(--text-muted)!important;}
    html.light .text-\[\#8c909f\]{color:var(--text-subtle)!important;}
    html.light .text-\[\#adc6ff\]{color:var(--accent)!important;}
    html.light .bg-\[\#adc6ff\]{background-color:var(--accent)!important;color:var(--accent-on)!important;}
    html.light .text-\[\#002e6a\]{color:var(--accent-on)!important;}
    html.light .hover\:text-\[\#adc6ff\]:hover{color:var(--accent)!important;}
    html.light input{background-color:var(--bg-sidebar)!important;color:var(--text-primary)!important;}
    html.light input::placeholder{color:var(--text-subtle)!important;}
  </style>
  <script src="/static/js/app.js?v=6"></script>
</head>
<body class="min-h-screen flex items-center justify-center p-4" x-data x-init="$store.app.init()">

  <!-- Top-right controls -->
  <div class="fixed top-4 right-4 flex items-center gap-2">
    <button @click="$store.app.toggleLang()"
            class="h-9 px-3 rounded-full bg-[#1e1f26] ghost-border flex items-center justify-center hover:opacity-80 transition-opacity">
      <span class="text-xs font-bold text-[#c2c6d6]" x-text="$store.app.isEN ? 'TR' : 'EN'">EN</span>
    </button>
    <button @click="$store.app.toggleTheme()"
            class="w-9 h-9 rounded-full bg-[#1e1f26] ghost-border flex items-center justify-center hover:opacity-80 transition-opacity">
      <span class="material-symbols-outlined text-[#c2c6d6] text-base" x-text="$store.app.isDark ? 'light_mode' : 'dark_mode'">light_mode</span>
    </button>
  </div>

  <div class="w-full max-w-md">
    <div class="text-center mb-8">
      <h1 class="text-3xl font-bold text-primary tracking-tighter">CanPark</h1>
      <p class="text-[#8c909f] text-sm mt-1" x-text="$store.app.t('login_staff')">Personel Girişi</p>
    </div>

    <div class="bg-[#1e1f26] rounded-3xl p-8 ghost-border">
      {% if error %}
      <div class="mb-6 p-4 bg-[#93000a]/20 border border-[#93000a]/30 rounded-2xl flex items-center gap-3 text-[#ffb4ab] text-sm">
        <span class="material-symbols-outlined text-base">error</span>
        {{ error }}
      </div>
      {% endif %}

      <form method="post" action="/login" class="space-y-5">
        <div>
          <label class="block text-xs font-semibold text-[#8c909f] uppercase tracking-wider mb-2"
                 x-text="$store.app.t('login_email')">E-posta</label>
          <div class="flex items-center bg-[#191b22] rounded-xl ghost-border px-4 py-3 gap-3">
            <span class="material-symbols-outlined text-[#8c909f] text-base">email</span>
            <input type="email" name="email" required autocomplete="email"
                   class="flex-1 bg-transparent border-none focus:ring-0 text-sm text-[#e2e2eb] placeholder:text-[#8c909f]"
                   placeholder="admin@otopark.local"/>
          </div>
        </div>
        <div>
          <label class="block text-xs font-semibold text-[#8c909f] uppercase tracking-wider mb-2"
                 x-text="$store.app.t('login_password')">Şifre</label>
          <div class="flex items-center bg-[#191b22] rounded-xl ghost-border px-4 py-3 gap-3">
            <span class="material-symbols-outlined text-[#8c909f] text-base">lock</span>
            <input type="password" name="password" required autocomplete="current-password"
                   class="flex-1 bg-transparent border-none focus:ring-0 text-sm text-[#e2e2eb] placeholder:text-[#8c909f]"
                   placeholder="••••••••"/>
          </div>
        </div>
        <button type="submit"
                class="w-full h-12 bg-[#adc6ff] text-[#002e6a] font-bold rounded-xl flex items-center justify-center gap-2
                       hover:brightness-110 active:scale-95 transition-all glow-active mt-2">
          <span class="material-symbols-outlined text-base" style="font-variation-settings:'FILL' 1;">login</span>
          <span x-text="$store.app.t('login_btn')">Giriş Yap</span>
        </button>
      </form>

      <div class="mt-4 text-center">
        <a href="/forgot-password" class="text-xs text-[#8c909f] hover:text-[#adc6ff] transition-colors">
          Şifremi unuttum
        </a>
      </div>
    </div>

    <div class="mt-6 flex flex-col items-center gap-2 text-sm text-[#8c909f]">
      <a href="/musteri/login" class="flex items-center gap-1.5 hover:text-[#adc6ff] transition-colors">
        <span class="material-symbols-outlined text-base">person</span>
        <span x-text="$store.app.t('login_customer_cta')">Müşteri girişi</span>
      </a>
      <a href="/plaka-sorgula" class="flex items-center gap-1.5 hover:text-[#adc6ff] transition-colors">
        <span class="material-symbols-outlined text-base">search</span>
        <span x-text="$store.app.t('login_plate_cta')">Plaka sorgula / borç öde</span>
      </a>
    </div>
  </div>
</body>
</html>
