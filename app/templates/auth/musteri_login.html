<!DOCTYPE html>
<html lang="{{ lang }}" class="dark">
<head>
  <meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Müşteri Girişi | CanPark</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <script>tailwind.config={darkMode:"class",theme:{extend:{colors:{"primary":"#adc6ff","surface-container":"#1e1f26","surface-container-low":"#191b22","on-surface":"#e2e2eb","outline-variant":"#424754","error":"#ffb4ab"}}}}</script>
  <style>.material-symbols-outlined{font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24;}body{background-color:#111319;color:#e2e2eb;font-family:'Inter',sans-serif;}.ghost-border{border:1px solid rgba(66,71,84,0.15);}.glow-active{box-shadow:0 0 20px rgba(77,142,255,0.30);}</style>
  <script src="/static/js/app.js?v=6"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body class="min-h-screen flex items-center justify-center p-4" x-data x-init="$store.app.init()">
  <div class="fixed top-4 right-4 flex items-center gap-2 z-50">
    <button @click="$store.app.toggleLang()"
            class="h-8 px-3 rounded-full bg-[#1e1f26] ghost-border flex items-center justify-center hover:opacity-80 transition-opacity">
      <span class="text-xs font-bold text-[#c2c6d6] tracking-wider" x-text="$store.app.isEN ? 'TR' : 'EN'">EN</span>
    </button>
    <button @click="$store.app.toggleTheme()"
            class="w-8 h-8 rounded-full bg-[#1e1f26] ghost-border flex items-center justify-center hover:opacity-80 transition-opacity">
      <span class="material-symbols-outlined text-[#c2c6d6] text-base" x-text="$store.app.isDark ? 'light_mode' : 'dark_mode'">light_mode</span>
    </button>
  </div>
  <div class="w-full max-w-md">
    <div class="text-center mb-8">
      <h1 class="text-3xl font-bold text-primary tracking-tighter">CanPark</h1>
      <p class="text-[#8c909f] text-sm mt-1" x-text="$store.app.t('portal_welcome')">Müşteri Portalı</p>
    </div>
    <div class="bg-[#1e1f26] rounded-3xl p-8 ghost-border">
      {% if error %}
      <div class="mb-5 p-4 bg-[#93000a]/20 rounded-2xl text-[#ffb4ab] text-sm flex items-center gap-2">
        <span class="material-symbols-outlined text-base">error</span>{{ error }}
      </div>
      {% endif %}
      <form method="post" action="/musteri/login" class="space-y-5">
        <div>
          <label class="block text-xs font-semibold text-[#8c909f] uppercase tracking-wider mb-2" x-text="$store.app.t('login_email')">E-posta</label>
          <input type="email" name="email" required class="w-full bg-[#191b22] rounded-xl ghost-border px-4 py-3 text-sm text-[#e2e2eb] placeholder:text-[#8c909f] focus:outline-none" placeholder="ahmet@email.com"/>
        </div>
        <div>
          <label class="block text-xs font-semibold text-[#8c909f] uppercase tracking-wider mb-2" x-text="$store.app.t('login_password')">Şifre</label>
          <input type="password" name="password" required class="w-full bg-[#191b22] rounded-xl ghost-border px-4 py-3 text-sm text-[#e2e2eb] placeholder:text-[#8c909f] focus:outline-none" placeholder="••••••••"/>
        </div>
        <button type="submit" class="w-full h-12 bg-[#adc6ff] text-[#002e6a] font-bold rounded-xl hover:brightness-110 active:scale-95 transition-all glow-active" x-text="$store.app.t('login_btn')">Giriş Yap</button>
      </form>
    </div>
    <div class="mt-6 flex flex-col items-center gap-2 text-sm text-[#8c909f]">
      <a href="/musteri/register" class="flex items-center gap-1.5 hover:text-[#adc6ff] transition-colors">
        <span class="material-symbols-outlined text-base">person_add</span>
        <span x-text="$store.app.t('login_customer_cta')">Hesabınız yok mu? Kayıt olun</span>
      </a>
      <a href="/login" class="flex items-center gap-1.5 hover:text-[#adc6ff] transition-colors">
        <span class="material-symbols-outlined text-base">admin_panel_settings</span>
        <span x-text="$store.app.t('login_staff')">Admin / Personel girişi</span>
      </a>
      <a href="/plaka-sorgula" class="flex items-center gap-1.5 hover:text-[#adc6ff] transition-colors">
        <span class="material-symbols-outlined text-base">search</span>
        <span x-text="$store.app.t('login_plate_cta')">Plaka sorgula / borç öde</span>
      </a>
    </div>
  <input type="hidden" name="lang" value="{{ lang }}">
  </div>
</body>
</html>
