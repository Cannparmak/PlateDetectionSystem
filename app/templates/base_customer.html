<!DOCTYPE html>
<html lang="{{ lang }}" class="dark">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}Müşteri Portalı{% endblock %} | CanPark</title>

  <!-- Flash önleme: sayfa render başlamadan tema sınıfını uygula -->
  <script>
    (function() {
      var t = localStorage.getItem("theme") || "dark";
      var h = document.documentElement;
      h.classList.remove("dark","light");
      h.classList.add(t);
    })();
  </script>

  <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>

  <script>
    tailwind.config = {
      darkMode: "class",
      theme: { extend: { colors: {
        "primary":                    "var(--accent)",
        "on-primary":                 "var(--accent-on)",
        "surface-container":          "var(--bg-card)",
        "surface-container-low":      "var(--bg-sidebar)",
        "surface-container-lowest":   "var(--bg-deep)",
        "surface-container-high":     "var(--bg-raised)",
        "surface-container-highest":  "var(--bg-chip)",
        "on-surface":                 "var(--text-primary)",
        "on-surface-variant":         "var(--text-muted)",
        "outline":                    "var(--text-subtle)",
        "outline-variant":            "var(--text-subtle)",
        "tertiary":                   "#4edea3",
        "tertiary-container":         "#00a572",
        "tertiary-fixed-dim":         "#4edea3",
        "error":                      "#ffb4ab",
        "error-container":            "#93000a",
        "primary-container":          "#4d8eff",
        "secondary-container":        "#42474f",
      }}}
    }
  </script>

  <style>
    .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; transition: none !important; }
    *, *::before, *::after { transition: background-color 0.2s ease, border-color 0.2s ease, color 0.15s ease; }

    /* ── Dark mode (default) ── */
    html, html.dark {
      --bg-base:      #111319;
      --bg-sidebar:   #191b22;
      --bg-card:      #1e1f26;
      --bg-deep:      #0c0e14;
      --bg-raised:    #282a30;
      --bg-chip:      #33343b;
      --text-primary: #e2e2eb;
      --text-muted:   #c2c6d6;
      --text-subtle:  #8c909f;
      --accent:       #adc6ff;
      --accent-on:    #002e6a;
      --accent-glow:  rgba(77,142,255,0.25);
      --card-shadow:  none;
      --divider:      rgba(66,71,84,0.15);
    }

    /* ── Light mode ── */
    html.light {
      --bg-base:      #e8ecf1;
      --bg-sidebar:   #f0f3f7;
      --bg-card:      #f6f8fb;
      --bg-deep:      #dde3ea;
      --bg-raised:    #eaecf2;
      --bg-chip:      #cdd5e0;
      --text-primary: #1c2128;
      --text-muted:   #424a57;
      --text-subtle:  #656d76;
      --accent:       #1a7f37;
      --accent-on:    #ffffff;
      --accent-glow:  rgba(26,127,55,0.18);
      --card-shadow:  0 1px 3px rgba(28,33,40,0.10), 0 1px 2px rgba(28,33,40,0.06);
      --divider:      rgba(28,33,40,0.10);
    }

    body   { background-color: var(--bg-base); color: var(--text-primary); font-family: 'Inter', sans-serif; }
    header { background-color: var(--bg-sidebar) !important; border-bottom: 1px solid var(--divider); }

    /* Hardcoded hex → CSS variable (light mode) — # must be escaped as \# in selectors */
    html.light .bg-\[\#111319\] { background-color: var(--bg-base)    !important; }
    html.light .bg-\[\#191b22\] { background-color: var(--bg-sidebar) !important; }
    html.light .bg-\[\#1e1f26\] { background-color: var(--bg-card)    !important; box-shadow: var(--card-shadow); }
    html.light .bg-\[\#0c0e14\] { background-color: var(--bg-deep)    !important; }
    html.light .bg-\[\#282a30\] { background-color: var(--bg-raised)  !important; }
    html.light .bg-\[\#33343b\] { background-color: var(--bg-chip)    !important; }

    html.light .text-white,
    html.light .text-\[\#e2e2eb\] { color: var(--text-primary) !important; }
    html.light .text-\[\#c2c6d6\] { color: var(--text-muted)   !important; }
    html.light .text-\[\#8c909f\],
    html.light .text-\[\#424754\] { color: var(--text-subtle)  !important; }

    html.light .text-\[\#adc6ff\] { color: var(--accent)    !important; }
    html.light .bg-\[\#adc6ff\]   { background-color: var(--accent) !important; color: var(--accent-on) !important; }
    html.light .text-\[\#002e6a\] { color: var(--accent-on) !important; }

    html.light .hover\:text-white:hover       { color: var(--text-primary) !important; }
    html.light .hover\:bg-\[\#282a30\]:hover  { background-color: var(--bg-raised) !important; }
    html.light .hover\:text-\[\#adc6ff\]:hover { color: var(--accent) !important; }

    html.light input, html.light select, html.light textarea {
      color: var(--text-primary) !important;
      background-color: var(--bg-card) !important;
      border-color: rgba(28,33,40,0.15) !important;
    }
    html.light input::placeholder { color: var(--text-subtle) !important; }

    .ghost-border { border: 1px solid var(--divider); }
    html.light .ghost-border { box-shadow: var(--card-shadow); }

    .text-primary { color: var(--accent) !important; }

    html.dark  .signature-glow { box-shadow: 0 0 20px rgba(77,142,255,0.10); }
    html.light .signature-glow { box-shadow: var(--card-shadow); }

    .plate-font { font-family: 'Courier New', monospace; letter-spacing: 0.12em; }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg-base); }
    ::-webkit-scrollbar-thumb { background: var(--bg-chip); border-radius: 3px; }
  </style>

  <script src="/static/js/app.js?v=6"></script>
  {% block head %}{% endblock %}
</head>
<body class="min-h-screen" x-data x-init="$store.app.init()">

<header class="h-16 flex items-center justify-between px-6 sticky top-0 z-40">
  <a href="/musteri/dashboard" class="text-xl font-bold tracking-tighter" style="color:var(--accent)">CanPark</a>
  <nav class="flex items-center gap-4 text-sm">
    <a href="/musteri/dashboard" class="hover:opacity-80 transition-opacity flex items-center gap-1.5" style="color:var(--text-muted)">
      <span class="material-symbols-outlined text-base">home</span>
      <span x-text="$store.app.t('nav_dashboard')">Dashboard</span>
    </a>
    <a href="/musteri/subscriptions" class="hover:opacity-80 transition-opacity flex items-center gap-1.5" style="color:var(--text-muted)">
      <span class="material-symbols-outlined text-base">card_membership</span>
      <span x-text="$store.app.t('portal_my_subs')">Aboneliklerim</span>
    </a>
    <a href="/musteri/sessions" class="hover:opacity-80 transition-opacity flex items-center gap-1.5" style="color:var(--text-muted)">
      <span class="material-symbols-outlined text-base">history</span>
      <span x-text="$store.app.t('portal_my_sessions')">Geçmişim</span>
    </a>

    <button @click="$store.app.toggleTheme()"
            class="w-8 h-8 rounded-full ghost-border flex items-center justify-center hover:opacity-80 transition-opacity"
            style="background:var(--bg-card)">
      <span class="material-symbols-outlined text-base" style="color:var(--text-muted)" x-text="$store.app.isDark ? 'light_mode' : 'dark_mode'">light_mode</span>
    </button>

    <button @click="$store.app.toggleLang()"
            class="h-8 px-2.5 rounded-full ghost-border flex items-center justify-center hover:opacity-80 transition-opacity"
            style="background:var(--bg-card)">
      <span class="text-xs font-bold" style="color:var(--text-muted)" x-text="$store.app.isEN ? 'TR' : 'EN'">EN</span>
    </button>

    <a href="/logout" class="hover:opacity-80 transition-opacity flex items-center gap-1.5" style="color:var(--text-muted)">
      <span class="material-symbols-outlined text-base">logout</span>
      <span x-text="$store.app.t('nav_logout')">Çıkış</span>
    </a>
  </nav>
</header>

<main class="max-w-4xl mx-auto px-6 py-10 space-y-8">
  {% block content %}{% endblock %}
</main>

{% block scripts %}{% endblock %}
</body>
</html>
