<!DOCTYPE html>
<html lang="tr" class="dark">
<head>
  <meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>500 — CanPark</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <style>
    .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
    body { background-color: #111319; color: #e2e2eb; font-family: 'Inter', sans-serif; }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center">
  <div class="text-center px-6">
    <p class="text-8xl font-bold text-[#1e1f26] mb-2 font-mono">500</p>
    <div class="w-20 h-20 rounded-full bg-[#93000a]/20 flex items-center justify-center mx-auto mb-6">
      <span class="material-symbols-outlined text-[#ffb4ab] text-4xl">error</span>
    </div>
    <h1 class="text-2xl font-bold text-white mb-2">Sunucu Hatası</h1>
    <p class="text-[#8c909f] mb-2">Beklenmeyen bir hata oluştu. Lütfen daha sonra tekrar deneyin.</p>
    {% if detail %}
    <p class="text-xs text-[#8c909f] font-mono bg-[#1e1f26] rounded-xl px-4 py-2 inline-block mb-6">{{ detail }}</p>
    {% endif %}
    <div class="mt-6">
      <a href="/dashboard"
         class="inline-flex items-center gap-2 px-6 py-3 bg-[#adc6ff] text-[#002e6a] font-bold rounded-2xl hover:brightness-110 active:scale-95 transition-all">
        <span class="material-symbols-outlined text-lg">home</span>
        Dashboard'a Dön
      </a>
    </div>
  </div>
</body>
</html>
