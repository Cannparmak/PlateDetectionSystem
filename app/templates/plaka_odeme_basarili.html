<!DOCTYPE html>
<html lang="tr" class="dark">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ödeme Başarılı | CanPark</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <style>
    .material-symbols-outlined{font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24;}
    body{background-color:#111319;color:#e2e2eb;font-family:'Inter',sans-serif;}
    .ghost-border{border:1px solid rgba(66,71,84,0.15);}
    .plate-font{font-family:'Courier New',monospace;letter-spacing:0.12em;}
    @keyframes pop{0%{transform:scale(0.6);opacity:0}60%{transform:scale(1.12)}100%{transform:scale(1);opacity:1}}
    .pop{animation:pop 0.5s cubic-bezier(.4,0,.2,1) both;}
  </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
  <div class="w-full max-w-md text-center space-y-6">

    <!-- Success icon -->
    <div class="pop inline-flex items-center justify-center w-24 h-24 rounded-full mx-auto"
         style="background:rgba(78,222,163,0.15);border:2px solid rgba(78,222,163,0.35)">
      <span class="material-symbols-outlined text-5xl text-[#4edea3]" style="font-variation-settings:'FILL' 1;">check_circle</span>
    </div>

    <div>
      <h1 class="text-2xl font-bold text-[#4edea3]">Ödeme Başarılı!</h1>
      <p class="text-[#8c909f] text-sm mt-2">
        <span class="plate-font font-bold text-[#adc6ff]">{{ plate_display }}</span>
        plakalı araca ait
        <span class="font-bold text-[#e2e2eb]">₺{{ tutar }}</span>
        tutarındaki borç ödendi.
      </p>
    </div>

    <!-- Card -->
    <div class="bg-[#1e1f26] rounded-2xl p-6 ghost-border space-y-3 text-left">
      <div class="flex items-center gap-3">
        <span class="material-symbols-outlined text-[#4edea3]" style="font-variation-settings:'FILL' 1;">receipt_long</span>
        <div>
          <p class="text-sm font-bold text-[#e2e2eb]">Ödeme özeti</p>
          <p class="text-xs text-[#8c909f]">Online kredi kartı ile ödendi</p>
        </div>
      </div>
      <div class="flex items-center justify-between bg-[#191b22] rounded-xl px-4 py-3">
        <p class="text-sm text-[#8c909f]">Plaka</p>
        <p class="plate-font font-bold text-[#adc6ff]">{{ plate_display }}</p>
      </div>
      <div class="flex items-center justify-between bg-[#191b22] rounded-xl px-4 py-3">
        <p class="text-sm text-[#8c909f]">Ödenen tutar</p>
        <p class="text-lg font-bold text-[#4edea3]">₺{{ tutar }}</p>
      </div>
    </div>

    <div class="flex flex-col items-center gap-3">
      <a href="/plaka-sorgula?plaka={{ plate_number }}"
         class="w-full h-11 bg-[#adc6ff] text-[#002e6a] font-bold rounded-xl flex items-center justify-center gap-2
                hover:brightness-110 active:scale-95 transition-all text-sm">
        <span class="material-symbols-outlined text-base" style="font-variation-settings:'FILL' 1;">search</span>
        Plakayı tekrar sorgula
      </a>
      <a href="/" class="text-sm text-[#8c909f] hover:text-[#c2c6d6] transition-colors">
        Ana sayfaya dön
      </a>
    </div>

  </div>
</body>
</html>
